services:
  - type: web
    name: discord-vc-logger
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DISCORD_TOKEN
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
      - key: GUILD_ID
        sync: false
